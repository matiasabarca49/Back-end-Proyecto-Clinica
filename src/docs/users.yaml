paths:
  # ==================== USERS ====================
  /api/users/:
    get:
      summary: "Obtener usuarios. Se pueden obtener en páginas"
      tags:
        - Users
      security:
        - cookieAuth: []
      parameters:
        - name: search
          in: query
          required: false
          description: "Búsqueda por apellido, nombre, email o dni"
          schema:
            type: string
        - name: rol
          in: query
          required: false
          description: "Filtro por rol"
          schema:
            type: string
            enum: ["admin", "doctor", "employee"]
        - name: sort
          in: query
          required: false
          description: "Ordenamiento por apellido (1=ASC, -1=DESC)"
          schema:
            type: integer
            enum: [1, -1]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: "Usuarios paginados obtenidos"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Success"
                  users:
                    type: object
                    properties:
                      docs:
                        type: array
                        items:
                          $ref: "#/components/schemas/UserResponse"
                      totalDocs:
                        type: integer
                      limit:
                        type: integer
                      page:
                        type: integer
                      totalPages:
                        type: integer
                      hasNextPage:
                        type: boolean
                      hasPrevPage:
                        type: boolean
        "500":
          description: "Error en el servidor"

    post:
      summary: "Crear un nuevo usuario"
      description: "Si el rol es 'Doctor', también crea un registro en la colección Doctors con los campos dni, phone y professionalLicense"
      tags:
        - Users
      security:
        - cookieAuth: []
      requestBody:
        description: "Datos del usuario en formato JSON"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: "Usuario creado exitosamente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Success"
                  user:
                    $ref: "#/components/schemas/UserResponse"
        "400":
          description: "Faltan campos requeridos para Doctor"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ERROR"
                  message:
                    type: string
                    example: "Faltan campos de Doctor: dni, phone, professionalLicense"
        "409":
          description: "Email duplicado"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ERROR"
                  message:
                    type: string
                    example: "El email ya existe"
        "500":
          description: "Error en la creación"

  /api/users/{id}:
    get:
      summary: "Obtener un usuario por ID"
      tags:
        - Users
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID del usuario"
          schema:
            type: string
      responses:
        "200":
          description: "Usuario encontrado"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Success"
                  users:
                    $ref: "#/components/schemas/UserResponse"
        "404":
          description: "Usuario no encontrado"
        "500":
          description: "Error en el servidor"

    put:
      summary: "Actualizar un usuario"
      description: "Actualiza datos del usuario. Si se promociona a Doctor, sincroniza con la colección Doctors"
      tags:
        - Users
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID del usuario"
          schema:
            type: string
      requestBody:
        description: "Datos a actualizar"
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
            example:
              password: "newPassword123"
              rol: "Doctor"
      responses:
        "200":
          description: "Usuario actualizado exitosamente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Success"
                  user:
                    $ref: "#/components/schemas/UserResponse"
        "400":
          description: "Faltan campos para promoción a Doctor"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ERROR"
                  message:
                    type: string
                    example: "Para promocionar a Doctor se requieren: dni, phone, professionalLicense"
        "404":
          description: "Usuario no encontrado"
        "409":
          description: "Email duplicado"
        "500":
          description: "Error en el servidor"

    delete:
      summary: "Eliminar un usuario"
      description: "Elimina el usuario. Si es Doctor, también elimina su registro en la colección Doctors"
      tags:
        - Users
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "ID del usuario"
          schema:
            type: string
      responses:
        "200":
          description: "Usuario eliminado exitosamente"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "Success"
                  user:
                    $ref: "#/components/schemas/UserResponse"
        "404":
          description: "Usuario no encontrado"
        "500":
          description: "Error en el servidor"

components:
  schemas:
    # ========== USER SCHEMAS ==========
    UserCreate:
      type: object
      required:
        - name
        - lastName
        - email
        - password
        - rol
      properties:
        name:
          type: string
          description: "Nombre del usuario"
          example: "John"
        lastName:
          type: string
          description: "Apellido del usuario"
          example: "Doe"
        email:
          type: string
          format: email
          description: "Email del usuario (debe ser único)"
          example: "john.doe@example.com"
        password:
          type: string
          format: password
          description: "Contraseña del usuario (se hashea automáticamente)"
          minLength: 8
          example: "securePassword123"
        rol:
          type: string
          enum: ["Admin", "Doctor", "Employee"]
          description: "Rol del usuario en el sistema"
          example: "Doctor"
        doctorFields:
          type: object
          description: "Campos adicionales REQUERIDOS si rol es 'Doctor'"
          required:
            - dni
            - phone
            - professionalLicense
          properties:
            dni:
              type: string
              description: "DNI del doctor"
              example: "12345678"
            phone:
              type: string
              description: "Teléfono del doctor"
              example: "+5492612345678"
            professionalLicense:
              type: string
              description: "Matrícula profesional del doctor"
              example: "MP12345"

    UserUpdate:
      type: object
      properties:
        name:
          type: string
          description: "Nombre del usuario"
        lastName:
          type: string
          description: "Apellido del usuario"
        email:
          type: string
          format: email
          description: "Email del usuario"
        password:
          type: string
          format: password
          description: "Nueva contraseña (se hashea automáticamente)"
          minLength: 8
        rol:
          type: string
          enum: ["Admin", "Doctor", "Employee"]
          description: "Rol del usuario"
        doctorFields:
          type: object
          description: "Campos adicionales requeridos si se promociona a Doctor"
          properties:
            dni:
              type: string
            phone:
              type: string
            professionalLicense:
              type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
          description: "ID único del usuario"
          example: "507f1f77bcf86cd799439011"
        name:
          type: string
          description: "Nombre del usuario"
          example: "John"
        lastName:
          type: string
          description: "Apellido del usuario"
          example: "Doe"
        email:
          type: string
          format: email
          description: "Email del usuario"
          example: "john.doe@example.com"
        rol:
          type: string
          enum: ["Admin", "Doctor", "Employee"]
          description: "Rol del usuario en el sistema"
          example: "Doctor"
